<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 | 云谱智探</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-core: #041129;
            --bg-panel: rgba(10, 30, 60, 0.74);
            --bg-panel-strong: rgba(15, 44, 84, 0.9);
            --line-cyan: rgba(132, 221, 255, 0.28);
            --line-soft: rgba(132, 221, 255, 0.14);
            --text-main: #edf6ff;
            --text-dim: #a9c4e2;
            --neon-cyan: #73eeff;
            --neon-blue: #6ba9ff;
            --neon-green: #7effca;
            --neon-orange: #ffcc73;
            --neon-red: #ff6a90;
            --font-title: 'Orbitron', sans-serif;
            --font-data: 'Rajdhani', sans-serif;
            --radius-lg: 22px;
            --radius-md: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            color: var(--text-main);
            font-family: var(--font-data);
            background:
                radial-gradient(circle at 12% -6%, rgba(131, 190, 255, 0.38) 0%, transparent 43%),
                radial-gradient(circle at 88% -10%, rgba(80, 153, 255, 0.32) 0%, transparent 42%),
                linear-gradient(180deg, #0a2343 0%, #061a33 34%, #041226 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(164, 221, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(164, 221, 255, 0.06) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at 50% 18%, black 18%, transparent 70%);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(12px);
            background: linear-gradient(90deg, rgba(30, 78, 138, 0.9), rgba(20, 57, 107, 0.9));
            border-bottom: 1px solid var(--line-cyan);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-title);
            font-size: 1.45rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 14px rgba(115, 238, 255, 0.45);
        }

        .btn-back {
            border: 1px solid var(--line-cyan);
            background: rgba(115, 238, 255, 0.1);
            color: var(--neon-cyan);
            padding: 9px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--font-data);
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .btn-back:hover {
            transform: translateY(-1px);
            background: var(--neon-cyan);
            color: #05233f;
            box-shadow: 0 10px 25px rgba(115, 238, 255, 0.35);
        }

        .container {
            max-width: 1320px;
            margin: 28px auto 56px;
            padding: 0 24px;
            display: grid;
            grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
            gap: 24px;
            align-items: stretch;
        }

        .profile-card {
            position: relative;
            top: auto;
            background:
                linear-gradient(160deg, rgba(26, 70, 128, 0.85) 0%, rgba(18, 51, 97, 0.9) 100%);
            border: 1px solid var(--line-cyan);
            border-radius: var(--radius-lg);
            padding: 30px 26px 24px;
            box-shadow:
                0 24px 48px rgba(10, 33, 68, 0.42),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 120px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            background: linear-gradient(120deg, rgba(115, 238, 255, 0.25), rgba(107, 169, 255, 0.15));
            pointer-events: none;
            z-index: 0;
        }

        .profile-card > * {
            position: relative;
            z-index: 1;
        }

        .avatar-wrap {
            margin: 4px auto 16px;
            width: fit-content;
            text-align: center;
        }

        .avatar {
            width: 108px;
            height: 108px;
            margin: 0 auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-title);
            font-size: 2.5rem;
            color: #08335d;
            background: linear-gradient(135deg, #b4fbff 0%, #6caeff 55%, #76c9ff 100%);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 14px 30px rgba(78, 182, 255, 0.42);
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .avatar.uploaded {
            color: transparent;
            border-color: rgba(255, 255, 255, 0.72);
        }

        .avatar-tools {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .avatar-btn {
            border: 1px solid rgba(132, 221, 255, 0.42);
            background: rgba(115, 238, 255, 0.12);
            color: var(--neon-cyan);
            border-radius: 9px;
            padding: 6px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: var(--font-data);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .avatar-btn:hover {
            background: rgba(115, 238, 255, 0.92);
            color: #063259;
        }

        .avatar-btn.secondary {
            border-color: rgba(132, 221, 255, 0.26);
            background: rgba(133, 173, 219, 0.14);
            color: #d4e8ff;
        }

        .avatar-btn.secondary:hover {
            background: rgba(212, 232, 255, 0.92);
            color: #17365f;
        }

        .avatar-hint {
            margin-top: 7px;
            color: var(--text-dim);
            font-size: 0.74rem;
            letter-spacing: 0.2px;
        }

        .profile-card h2 {
            text-align: center;
            font-family: var(--font-title);
            font-size: 1.48rem;
            color: #dcf6ff;
            margin-bottom: 8px;
        }

        .role {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 700;
            margin: 0 auto 10px;
        }

        .role-admin {
            color: #caffec;
            background: rgba(126, 255, 202, 0.15);
            border: 1px solid rgba(126, 255, 202, 0.45);
        }

        .role-user {
            color: #cbf6ff;
            background: rgba(115, 238, 255, 0.14);
            border: 1px solid rgba(115, 238, 255, 0.4);
        }

        .profile-card .email {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.96rem;
            margin-bottom: 18px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            border: 1px solid var(--line-soft);
            background: rgba(9, 31, 64, 0.45);
            border-radius: 12px;
            padding: 12px 10px;
            text-align: center;
        }

        .stat-item .value {
            font-family: var(--font-title);
            font-size: 1.4rem;
            color: var(--neon-cyan);
            margin-bottom: 2px;
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.6px;
        }

        .profile-note {
            border: 1px dashed rgba(115, 238, 255, 0.32);
            background: rgba(8, 31, 67, 0.45);
            border-radius: 12px;
            padding: 11px 12px;
            color: var(--text-dim);
            font-size: 0.86rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .left-actions {
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid rgba(132, 221, 255, 0.2);
        }

        .left-actions .btn {
            width: 100%;
        }

        .admin-link {
            margin-top: 6px;
        }

        .admin-link a {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            border: 1px solid rgba(255, 204, 115, 0.65);
            background: rgba(255, 204, 115, 0.14);
            color: #ffe0ab;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 11px;
            font-weight: 700;
            transition: all 0.25s ease;
        }

        .admin-link a:hover {
            background: rgba(255, 204, 115, 0.95);
            color: #3b2400;
        }

        .workspace {
            display: grid;
            gap: 18px;
            min-width: 0;
        }

        .section-card {
            border: 1px solid var(--line-soft);
            border-radius: var(--radius-md);
            overflow: hidden;
            background: linear-gradient(155deg, rgba(20, 57, 105, 0.82), rgba(14, 43, 85, 0.9));
            box-shadow: 0 14px 32px rgba(10, 33, 66, 0.3);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--line-soft);
            background: rgba(15, 43, 83, 0.6);
        }

        .section-header h3 {
            display: flex;
            align-items: center;
            gap: 9px;
            font-family: var(--font-title);
            font-size: 1.02rem;
            color: var(--neon-cyan);
        }

        .section-header small {
            color: var(--text-dim);
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .section-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #d2e6fb;
            margin-bottom: 7px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: 1px solid rgba(132, 221, 255, 0.26);
            background: rgba(10, 34, 67, 0.78);
            color: var(--text-main);
            font-family: var(--font-data);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-group input::placeholder {
            color: rgba(183, 208, 234, 0.7);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(115, 238, 255, 0.65);
            box-shadow: 0 0 0 3px rgba(115, 238, 255, 0.14);
        }

        .form-group input:disabled {
            color: #8cb0d4;
            background: rgba(13, 44, 86, 0.52);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 4px;
        }

        .btn {
            border: 1px solid;
            border-radius: 10px;
            padding: 10px 18px;
            font-family: var(--font-data);
            font-size: 0.96rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.22s ease;
        }

        .btn-primary {
            background: rgba(115, 238, 255, 0.13);
            border-color: rgba(115, 238, 255, 0.5);
            color: var(--neon-cyan);
        }

        .btn-primary:hover {
            background: rgba(115, 238, 255, 0.95);
            color: #063259;
        }

        .btn-success {
            background: rgba(126, 255, 202, 0.12);
            border-color: rgba(126, 255, 202, 0.55);
            color: var(--neon-green);
        }

        .btn-success:hover {
            background: rgba(126, 255, 202, 0.95);
            color: #063d2a;
        }

        .btn-danger {
            background: rgba(255, 106, 144, 0.12);
            border-color: rgba(255, 106, 144, 0.55);
            color: var(--neon-red);
        }

        .btn-danger:hover {
            background: rgba(255, 106, 144, 0.95);
            color: #4b0822;
        }

        .message {
            display: none;
            border-radius: 10px;
            margin-bottom: 14px;
            padding: 10px 12px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .message.success {
            display: block;
            border: 1px solid rgba(126, 255, 202, 0.55);
            background: rgba(126, 255, 202, 0.12);
            color: var(--neon-green);
        }

        .message.error {
            display: block;
            border: 1px solid rgba(255, 106, 144, 0.52);
            background: rgba(255, 106, 144, 0.12);
            color: #ffb6cb;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
        }

        th, td {
            padding: 11px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(132, 221, 255, 0.12);
        }

        th {
            background: rgba(23, 64, 116, 0.72);
            color: var(--neon-cyan);
            font-size: 0.84rem;
            letter-spacing: 0.9px;
            text-transform: uppercase;
        }

        tbody tr:hover {
            background: rgba(115, 238, 255, 0.06);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 58px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .status-normal {
            background: rgba(115, 238, 255, 0.14);
            color: var(--neon-cyan);
            border: 1px solid rgba(115, 238, 255, 0.34);
        }

        .status-anomaly {
            background: rgba(255, 204, 115, 0.16);
            color: var(--neon-orange);
            border: 1px solid rgba(255, 204, 115, 0.38);
        }

        .empty-state {
            text-align: center;
            padding: 36px 18px;
            color: var(--text-dim);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 14px 0 4px;
        }

        .pagination button {
            border: 1px solid rgba(132, 221, 255, 0.34);
            background: rgba(115, 238, 255, 0.12);
            color: var(--neon-cyan);
            border-radius: 8px;
            padding: 7px 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
            background: rgba(115, 238, 255, 0.95);
            color: #07325a;
        }

        .pagination button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .pagination span {
            color: var(--text-dim);
            font-size: 0.92rem;
        }

        .loading {
            text-align: center;
            padding: 34px;
            color: var(--neon-cyan);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1120px) {
            .container {
                grid-template-columns: 1fr;
            }

            .profile-card {
                position: relative;
                top: auto;
            }
        }

        @media (max-width: 780px) {
            .header {
                padding: 13px 16px;
            }

            .header h1 {
                font-size: 1.2rem;
                gap: 9px;
            }

            .btn-back {
                padding: 8px 12px;
                font-size: 0.88rem;
            }

            .container {
                margin-top: 18px;
                padding: 0 12px;
                gap: 14px;
            }

            .profile-card {
                padding: 22px 16px 18px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .section-body {
                padding: 14px;
            }

            .section-header {
                padding: 12px 14px;
            }

            .section-header h3 {
                font-size: 0.94rem;
            }

            .section-header small {
                display: none;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            table {
                min-width: 640px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-user-astronaut"></i> 个人中心</h1>
        <button class="btn-back" onclick="location.href='main.html'">
            <i class="fas fa-arrow-left"></i> 返回主页
        </button>
    </div>

    <div class="container">
        <!-- Profile Card -->
        <aside class="profile-card">
            <div class="avatar-wrap">
                <div class="avatar" id="avatar">?</div>
                <input id="avatar-input" type="file" accept="image/*" style="display:none;" onchange="handleAvatarSelected(event)">
                <div class="avatar-tools">
                    <button class="avatar-btn" type="button" onclick="triggerAvatarUpload()">
                        <i class="fas fa-camera"></i> 更换头像
                    </button>
                    <button class="avatar-btn secondary" type="button" onclick="clearAvatarImage()">
                        <i class="fas fa-rotate-left"></i> 恢复默认
                    </button>
                </div>
                <div class="avatar-hint">支持 JPG/PNG/WebP，建议小于 2MB</div>
            </div>
            <h2 id="profile-name">加载中...</h2>
            <span class="role role-user" id="profile-role">用户</span>
            <p class="email" id="profile-email">-</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="value" id="stat-detections">-</div>
                    <div class="label">我的检测</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="stat-anomalies">-</div>
                    <div class="label">发现异常</div>
                </div>
            </div>
            <div class="profile-note">
                账号信息与检测记录实时同步。建议定期更新邮箱，便于系统发送异常通知与周报。
            </div>
            <div id="avatar-message" class="message"></div>

            <!-- Admin Link (only for admin) -->
            <div class="admin-link" id="admin-link" style="display: none;">
                <a href="admin.html">
                    <i class="fas fa-shield-alt"></i> 进入后台管理中心
                </a>
            </div>

            <div class="left-actions">
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
            </div>
        </aside>

        <main class="workspace">
            <!-- Edit Profile -->
            <section class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-edit"></i> 修改资料</h3>
                    <small>更新联系信息</small>
                </div>
                <div class="section-body">
                    <div id="edit-message" class="message"></div>
                    <div class="form-group">
                        <label>用户名（不可修改）</label>
                        <input type="text" id="edit-username" disabled>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="edit-email" placeholder="your@email.com">
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="saveProfile()">
                            <i class="fas fa-save"></i> 保存修改
                        </button>
                    </div>
                </div>
            </section>

            <!-- Change Password -->
            <section class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-key"></i> 修改密码</h3>
                    <small>保护账号安全</small>
                </div>
                <div class="section-body">
                    <div id="pwd-message" class="message"></div>
                    <div class="form-group">
                        <label>当前密码</label>
                        <input type="password" id="old-password" placeholder="输入当前密码">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>新密码</label>
                            <input type="password" id="new-password" placeholder="至少6位">
                        </div>
                        <div class="form-group">
                            <label>确认新密码</label>
                            <input type="password" id="confirm-password" placeholder="再次输入新密码">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-success" onclick="changePassword()">
                            <i class="fas fa-check"></i> 更新密码
                        </button>
                    </div>
                </div>
            </section>

            <!-- My Detection History -->
            <section class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-history"></i> 我的检测记录</h3>
                    <small>最近操作与结果</small>
                </div>
                <div class="section-body">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>位置</th>
                                    <th>气体</th>
                                    <th>结果</th>
                                    <th>浓度</th>
                                </tr>
                            </thead>
                            <tbody id="my-history">
                                <tr><td colspan="5" class="loading"><i class="fas fa-circle-notch fa-spin"></i> 加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="my-pagination"></div>
                </div>
            </section>
        </main>
    </div>

<script>
const API_BASE = 'http://localhost:5000';
let currentUser = null;
const AVATAR_STORAGE_PREFIX = 'sky_user_avatar_';

document.addEventListener('DOMContentLoaded', async () => {
    const stored = localStorage.getItem('sky_user');
    if (!stored) {
        location.href = 'login.html';
        return;
    }
    currentUser = JSON.parse(stored);

    // Set avatar initial (支持本地自定义头像)
    loadSavedAvatar();
    document.getElementById('profile-name').textContent = currentUser.username;
    document.getElementById('edit-username').value = currentUser.username;

    // Load profile from server
    await loadProfile();
    await loadMyHistory();

    // Show admin link if admin
    if (currentUser.role === 'admin') {
        document.getElementById('admin-link').style.display = 'block';
    }
});

function getAvatarStorageKey() {
    return AVATAR_STORAGE_PREFIX + (currentUser?.username || 'guest');
}

function applyDefaultAvatar() {
    const avatarEl = document.getElementById('avatar');
    if (!avatarEl) return;
    avatarEl.classList.remove('uploaded');
    avatarEl.style.backgroundImage = '';
    avatarEl.textContent = (currentUser?.username || '?').charAt(0).toUpperCase();
}

function applyAvatarImage(dataUrl) {
    const avatarEl = document.getElementById('avatar');
    if (!avatarEl) return;
    avatarEl.classList.add('uploaded');
    avatarEl.style.backgroundImage = `url(${dataUrl})`;
    avatarEl.textContent = '';
}

function loadSavedAvatar() {
    const saved = localStorage.getItem(getAvatarStorageKey());
    if (saved) {
        applyAvatarImage(saved);
    } else {
        applyDefaultAvatar();
    }
}

function triggerAvatarUpload() {
    const input = document.getElementById('avatar-input');
    if (!input) return;
    input.value = '';
    input.click();
}

function handleAvatarSelected(event) {
    const file = event?.target?.files?.[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
        showMessage('avatar-message', '请选择图片文件（JPG/PNG/WebP）', 'error');
        return;
    }

    if (file.size > 2 * 1024 * 1024) {
        showMessage('avatar-message', '图片过大，请选择 2MB 以内图片', 'error');
        return;
    }

    const reader = new FileReader();
    reader.onload = function() {
        const dataUrl = reader.result;
        if (typeof dataUrl !== 'string') {
            showMessage('avatar-message', '头像读取失败，请重试', 'error');
            return;
        }
        try {
            localStorage.setItem(getAvatarStorageKey(), dataUrl);
            applyAvatarImage(dataUrl);
            showMessage('avatar-message', '头像已更新', 'success');
        } catch (e) {
            console.error('save avatar error', e);
            showMessage('avatar-message', '头像保存失败，请换更小图片', 'error');
        }
    };
    reader.onerror = function() {
        showMessage('avatar-message', '头像读取失败，请重试', 'error');
    };
    reader.readAsDataURL(file);
}

function clearAvatarImage() {
    localStorage.removeItem(getAvatarStorageKey());
    applyDefaultAvatar();
    showMessage('avatar-message', '已恢复默认头像', 'success');
}

async function loadProfile() {
    try {
        const res = await fetch(API_BASE + '/auth/profile?username=' + currentUser.username);
        const data = await res.json();
        if (data.success && data.user) {
            const u = data.user;
            document.getElementById('profile-email').textContent = u.email || '未设置邮箱';
            document.getElementById('edit-email').value = u.email || '';
            
            const roleEl = document.getElementById('profile-role');
            if (u.role === 'admin') {
                roleEl.textContent = '管理员';
                roleEl.className = 'role role-admin';
            } else {
                roleEl.textContent = '普通用户';
                roleEl.className = 'role role-user';
            }
            // Update localStorage
            currentUser.role = u.role;
            currentUser.email = u.email;
            localStorage.setItem('sky_user', JSON.stringify(currentUser));
        }
    } catch (e) {
        console.error('loadProfile error', e);
    }
}

let myPage = 1;
async function loadMyHistory(page = 1) {
    myPage = page;
    try {
        const res = await fetch(API_BASE + `/admin/history?operator=${currentUser.username}&page=${page}&per_page=10`);
        const data = await res.json();
        
        // Update stats
        document.getElementById('stat-detections').textContent = data.total || 0;
        
        if (data.success && data.records.length) {
            const anomalies = data.records.filter(r => r.result === 'anomaly').length;
            document.getElementById('stat-anomalies').textContent = anomalies;
            
            document.getElementById('my-history').innerHTML = data.records.map(r => `
                <tr>
                    <td>${r.time || '-'}</td>
                    <td>${r.lat?.toFixed(4) || '-'}, ${r.lon?.toFixed(4) || '-'}</td>
                    <td>${r.gas_type || 'CH4'}</td>
                    <td><span class="status-badge status-${r.result === 'anomaly' ? 'anomaly' : 'normal'}">${r.result === 'anomaly' ? '异常' : '正常'}</span></td>
                    <td>${r.concentration || 0} ${r.unit || 'ppb'}</td>
                </tr>
            `).join('');
            
            // Pagination
            const totalPages = Math.ceil(data.total / 10) || 1;
            document.getElementById('my-pagination').innerHTML = `
                <button ${page <= 1 ? 'disabled' : ''} onclick="loadMyHistory(${page - 1})"><i class="fas fa-chevron-left"></i></button>
                <span>第 ${page} / ${totalPages} 页</span>
                <button ${page >= totalPages ? 'disabled' : ''} onclick="loadMyHistory(${page + 1})"><i class="fas fa-chevron-right"></i></button>
            `;
        } else {
            document.getElementById('stat-detections').textContent = '0';
            document.getElementById('stat-anomalies').textContent = '0';
            document.getElementById('my-history').innerHTML = '<tr><td colspan="5" class="empty-state"><i class="fas fa-inbox" style="font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.5;"></i>暂无检测记录</td></tr>';
            document.getElementById('my-pagination').innerHTML = '';
        }
    } catch (e) {
        console.error('loadMyHistory error', e);
        document.getElementById('my-history').innerHTML = '<tr><td colspan="5" class="empty-state">加载失败</td></tr>';
    }
}

function showMessage(elId, msg, type) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.style.display = 'block';
    el.textContent = msg;
    el.className = 'message ' + type;
    setTimeout(() => { el.style.display = 'none'; el.className = 'message'; }, 5000);
}

async function saveProfile() {
    const email = document.getElementById('edit-email').value.trim();
    try {
        const res = await fetch(API_BASE + '/auth/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: currentUser.username,
                email: email
            })
        });
        const data = await res.json();
        if (data.success) {
            showMessage('edit-message', '资料已更新', 'success');
            currentUser.email = email;
            localStorage.setItem('sky_user', JSON.stringify(currentUser));
            document.getElementById('profile-email').textContent = email || '未设置邮箱';
        } else {
            showMessage('edit-message', data.message || '更新失败', 'error');
        }
    } catch (e) {
        showMessage('edit-message', '网络错误', 'error');
    }
}

async function changePassword() {
    const oldPwd = document.getElementById('old-password').value;
    const newPwd = document.getElementById('new-password').value;
    const confirmPwd = document.getElementById('confirm-password').value;

    if (!oldPwd) return showMessage('pwd-message', '请输入当前密码', 'error');
    if (!newPwd || newPwd.length < 6) return showMessage('pwd-message', '新密码至少6位', 'error');
    if (newPwd !== confirmPwd) return showMessage('pwd-message', '两次密码不一致', 'error');

    try {
        const res = await fetch(API_BASE + '/auth/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: currentUser.username,
                old_password: oldPwd,
                new_password: newPwd
            })
        });
        const data = await res.json();
        if (data.success) {
            showMessage('pwd-message', '密码已更新', 'success');
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        } else {
            showMessage('pwd-message', data.message || '更新失败', 'error');
        }
    } catch (e) {
        showMessage('pwd-message', '网络错误', 'error');
    }
}

function logout() {
    if (confirm('确定退出登录？')) {
        localStorage.removeItem('sky_user');
        location.href = 'login.html';
    }
}
